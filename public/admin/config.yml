backend:
  name: github
  repo: nelsonbharathi/nelsonbharathi.github.io
  branch: main
  base_url: https://portfolio-oauth.nelsonbharathi1.workers.dev
  auth_endpoint: auth

# Where uploaded files go in the repo
media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: simple

collections:
  # =========================
  # SITE: PROFILE (Homepage)
  # =========================
  - name: "site_profile"
    label: "Profile (Homepage)"
    files:
      - file: "src/content/site/profile.md"
        label: "Profile"
        name: "profile"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Role", name: "role", widget: "string" }
          - {
              label: "Location",
              name: "location",
              widget: "string",
              required: false,
            }
          - { label: "Email", name: "email", widget: "string", required: false }
          - { label: "Phone", name: "phone", widget: "string", required: false }
          - { label: "Bio", name: "bio", widget: "text" }
          - { label: "Avatar", name: "avatar", widget: "image" }
          - {
              label: "Background image",
              name: "background",
              widget: "image",
              required: false,
            }
          - label: "Links"
            name: "links"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Highlight"
            name: "highlight"
            widget: "object"
            required: false
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "string" }

  # =========================
  # SITE: SETTINGS
  # =========================
  - name: "site_settings"
    label: "Site Settings"
    files:
      - file: "src/content/site/settings.md"
        label: "Settings"
        name: "settings"
        fields:
          - { label: "Site title", name: "site_title", widget: "string" }
          - {
              label: "Tagline",
              name: "tagline",
              widget: "string",
              required: false,
            }
          - {
              label: "Footer",
              name: "footer",
              widget: "string",
              required: false,
            }
          - label: "Homepage sections"
            name: "home_sections"
            widget: "object"
            fields:
              - {
                  label: "Show featured publications",
                  name: "show_featured_publications",
                  widget: "boolean",
                  default: true,
                }
              - {
                  label: "Show featured projects",
                  name: "show_featured_projects",
                  widget: "boolean",
                  default: true,
                }

  # =========================
  # PUBLICATIONS
  # =========================
  - name: "publications"
    label: "Publications"
    folder: "src/content/publications"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - {
          label: "Date",
          name: "date",
          widget: "datetime",
          format: "YYYY-MM-DD",
          required: false,
        }
      - { label: "Tags", name: "tags", widget: "list", default: [] }
      - {
          label: "Featured",
          name: "featured",
          widget: "boolean",
          default: false,
        }
      - label: "Links"
        name: "links"
        widget: "list"
        default: []
        summary: "{{fields.label}}"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - {
              label: "URL (https://... or /uploads/file.pdf)",
              name: "url",
              widget: "string",
            }
          - label: "Kind"
            name: "kind"
            widget: "select"
            options: ["view", "download", "external"]
            default: "external"
      - { label: "Body", name: "body", widget: "markdown" }

  # =========================
  # TEACHING
  # =========================
  - name: "teaching"
    label: "Teaching"
    folder: "src/content/teaching"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Topic Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - {
          label: "Date",
          name: "date",
          widget: "datetime",
          format: "YYYY-MM-DD",
          required: false,
        }
      - { label: "Tags", name: "tags", widget: "list", default: [] }
      - {
          label: "Featured",
          name: "featured",
          widget: "boolean",
          default: false,
        }
      - label: "Links"
        name: "links"
        widget: "list"
        default: []
        summary: "{{fields.label}}"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - {
              label: "URL (https://... or /uploads/file.pdf)",
              name: "url",
              widget: "string",
            }
          - label: "Kind"
            name: "kind"
            widget: "select"
            options: ["view", "download", "external"]
            default: "external"
      - { label: "Body", name: "body", widget: "markdown" }

  # =========================
  # PROJECTS
  # =========================
  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - {
          label: "Date",
          name: "date",
          widget: "datetime",
          format: "YYYY-MM-DD",
          required: false,
        }
      - { label: "Tags", name: "tags", widget: "list", default: [] }
      - {
          label: "Featured",
          name: "featured",
          widget: "boolean",
          default: false,
        }
      - label: "Links"
        name: "links"
        widget: "list"
        default: []
        summary: "{{fields.label}}"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - {
              label: "URL (https://... or /uploads/file.pdf)",
              name: "url",
              widget: "string",
            }
          - label: "Kind"
            name: "kind"
            widget: "select"
            options: ["view", "download", "external"]
            default: "external"
      - { label: "Body", name: "body", widget: "markdown" }

  # =========================
  # STUDENT PROJECTS
  # =========================
  - name: "student-projects"
    label: "Student Projects"
    folder: "src/content/student-projects"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - {
          label: "Date",
          name: "date",
          widget: "datetime",
          format: "YYYY-MM-DD",
          required: false,
        }
      - { label: "Tags", name: "tags", widget: "list", default: [] }
      - {
          label: "Featured",
          name: "featured",
          widget: "boolean",
          default: false,
        }
      - label: "Links"
        name: "links"
        widget: "list"
        default: []
        summary: "{{fields.label}}"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - {
              label: "URL (https://... or /uploads/file.pdf)",
              name: "url",
              widget: "string",
            }
          - label: "Kind"
            name: "kind"
            widget: "select"
            options: ["view", "download", "external"]
            default: "external"
      - { label: "Body", name: "body", widget: "markdown" }
